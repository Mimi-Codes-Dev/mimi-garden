<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Mimi's Knowledge Garden | 米米的知識花園</title>
    <!-- Markdown Library -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-green: #a8dadc;
            --soft-green: #f1faee;
            --accent-pink: #ffb7b2;
            --text-color: #457b9d;
            --card-bg: #ffffff;
            --garden-green: #81b29a;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--soft-green);
            color: #333;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--garden-green);
            color: white;
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-bottom: 5px solid var(--accent-pink);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        header p {
            margin: 0.5rem 0 0;
            font-style: italic;
            opacity: 0.9;
        }

        .container {
            max-width: 900px;
            width: 90%;
            margin: 2rem auto;
        }

        .search-container {
            margin-bottom: 2rem;
            text-align: center;
        }

        #search-input {
            width: 80%;
            padding: 1rem;
            border: 2px solid var(--garden-green);
            border-radius: 25px;
            font-size: 1.1rem;
            outline: none;
            transition: box-shadow 0.3s;
        }

        #search-input:focus {
            box-shadow: 0 0 10px var(--accent-pink);
        }

        .garden-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .knowledge-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 8px solid var(--garden-green);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .knowledge-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .knowledge-card::after {
            content: '🌱';
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 1.2rem;
            opacity: 0.3;
        }

        .tag-container {
            margin-bottom: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .card-tag {
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--garden-green);
            background: var(--soft-green);
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid var(--garden-green);
            text-transform: uppercase;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 0.8rem;
        }

        .card-snippet {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #666;
        }

        .footer {
            margin-top: auto;
            padding: 2rem;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }

        /* Modal for full content */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #aaa;
        }

        /* Markdown Styles */
        .markdown-body {
            line-height: 1.6;
            color: #444;
        }
        .markdown-body code {
            background: #f4f4f4;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
        }
        .markdown-body pre {
            background: #f4f4f4;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
        }
        .markdown-body blockquote {
            border-left: 4px solid var(--garden-green);
            margin-left: 0;
            padding-left: 1rem;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌿 Mimi's Knowledge Garden</h1>
        <p>米米的知識花園 — 紀錄每一顆成長的知識種子</p>
    </header>

    <div class="container">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="在花園中搜尋知識種子..." onkeyup="filterKnowledge()">
        </div>

        <div class="garden-grid" id="knowledge-grid">
            <!-- Knowledge cards will be injected here -->
        </div>
    </div>

    <div class="footer">
        Powered by OpenClaw & Mimi 🦐 | 讓知識像花朵一樣綻放
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        let knowledgeBase = [];

        async function loadKnowledge() {
            try {
                const response = await fetch('knowledge.json');
                knowledgeBase = await response.json();
                renderKnowledge();
            } catch (error) {
                console.error('Failed to load knowledge:', error);
                document.getElementById('knowledge-grid').innerHTML = '<p style="text-align:center; width:100%;"> Oops! 知識種子暫時無法載入 🦐💦</p>';
            }
        }

        function createCard(item) {
            const card = document.createElement('div');
            card.className = 'knowledge-card';
            card.onclick = () => openModal(item.id);
            
            const tagsHtml = item.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('');
            
            card.innerHTML = `
                <div class="tag-container">${tagsHtml}</div>
                <div class="card-title">${item.title}</div>
                <div class="card-snippet">${item.snippet}</div>
            `;
            return card;
        }

        function renderKnowledge() {
            const grid = document.getElementById('knowledge-grid');
            grid.innerHTML = '';

            knowledgeBase.forEach(item => {
                grid.appendChild(createCard(item));
            });
        }

        function filterKnowledge() {
            const query = document.getElementById('search-input').value.toLowerCase();
            
            const filtered = knowledgeBase.filter(item => 
                item.title.toLowerCase().includes(query) || 
                item.tags.some(tag => tag.toLowerCase().includes(query)) ||
                item.snippet.toLowerCase().includes(query)
            );
            
            const grid = document.getElementById('knowledge-grid');
            grid.innerHTML = '';
            filtered.forEach(item => {
                grid.appendChild(createCard(item));
            });
        }

        function openModal(id) {
            const item = knowledgeBase.find(k => k.id === id);
            const body = document.getElementById('modal-body');
            
            const tagsHtml = item.tags.map(tag => `<span class="card-tag" style="margin-right:5px">${tag}</span>`).join('');
            
            body.innerHTML = `
                <div class="tag-container">${tagsHtml}</div>
                <h2 style="color: var(--text-color); margin-top: 0;">${item.title}</h2>
                <p style="color: #888; font-size: 0.8rem;">記錄日期: ${item.date}</p>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 1rem 0;">
                <div class="markdown-body">${marked.parse(item.content)}</div>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        loadKnowledge();
    </script>
</body>
</html>
